<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Instagram Private Viewer | Aditya & PyExt</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    /* Glassmorphism container */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5);
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }
    h1 {
      font-size: 2.8rem;
      background: linear-gradient(120deg, #ff6a00, #ee0979);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
      animation: fadeInDown 0.8s ease;
    }
    .sub {
      font-size: 1.2rem;
      opacity: 0.9;
      margin-bottom: 1rem;
    }
    .credits {
      font-size: 0.9rem;
      background: rgba(255, 255, 255, 0.1);
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      margin-top: 0.5rem;
    }
    .credits span {
      color: #ff6a00;
      font-weight: bold;
    }

    /* Form */
    .search-box {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 2rem 0;
      flex-wrap: wrap;
    }
    .search-box input {
      padding: 0.9rem 1.5rem;
      width: 280px;
      border: none;
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      font-size: 1rem;
      outline: none;
      backdrop-filter: blur(5px);
      transition: all 0.3s;
    }
    .search-box input:focus {
      background: rgba(255, 255, 255, 0.25);
      box-shadow: 0 0 0 2px #ff6a00;
    }
    .search-box button {
      padding: 0.9rem 2rem;
      border: none;
      border-radius: 50px;
      background: linear-gradient(90deg, #ff6a00, #ee0979);
      color: white;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .search-box button:hover {
      transform: scale(1.02);
      box-shadow: 0 10px 20px rgba(238, 9, 121, 0.4);
    }

    /* Loading spinner */
    .loader {
      display: none;
      justify-content: center;
      margin: 2rem 0;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255, 255, 255, 0.3);
      border-top: 5px solid #ff6a00;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Stats & Messages */
    .stats {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 1rem;
      padding: 1.2rem;
      margin: 1rem 0;
      text-align: center;
      font-size: 1.2rem;
    }
    .success-msg {
      color: #00ff99;
      font-weight: bold;
    }
    .error-msg {
      color: #ff5e5e;
    }

    /* Gallery Grid */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.8rem;
      margin-top: 2rem;
    }
    .card {
      background: rgba(15, 15, 20, 0.8);
      backdrop-filter: blur(8px);
      border-radius: 1.2rem;
      overflow: hidden;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
      animation: fadeInUp 0.5s ease;
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.3);
      border-color: #ff6a00;
    }
    .card-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      cursor: pointer;
      transition: transform 0.3s;
    }
    .card-img:hover {
      transform: scale(1.02);
    }
    .card-info {
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .post-id {
      font-size: 0.75rem;
      font-family: monospace;
      background: rgba(0,0,0,0.5);
      padding: 0.3rem 0.6rem;
      border-radius: 20px;
    }
    .btn-group {
      display: flex;
      gap: 0.5rem;
    }
    .btn {
      padding: 0.4rem 0.9rem;
      border-radius: 30px;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
    }
    .btn-primary {
      background: linear-gradient(90deg, #ff6a00, #ee0979);
    }
    .btn-primary:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }
    .lightbox.active {
      display: flex;
    }
    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      border-radius: 1rem;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 0.85rem;
      opacity: 0.8;
    }

    /* Animations */
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📸 Instagram Private Viewer</h1>
    <div class="sub">Extract & view private posts (educational POC)</div>
    <div class="credits">
      🔥 Tool by <span>Aditya</span> | Channel <span>PyExt</span>
    </div>
  </div>

  <div class="search-box">
    <input type="text" id="username" placeholder="Enter Instagram username" autocomplete="off">
    <button id="searchBtn">🔍 Access Gallery</button>
  </div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
  </div>

  <div id="stats" class="stats" style="display: none;"></div>
  <div id="gallery" class="gallery"></div>

  <div class="footer">
    ⚠️ For educational purposes only. Respect privacy and use responsibly.
  </div>
</div>

<!-- Lightbox modal -->
<div id="lightbox" class="lightbox">
  <img src="" alt="Full size">
</div>

<script>
  const searchBtn = document.getElementById('searchBtn');
  const usernameInput = document.getElementById('username');
  const loader = document.getElementById('loader');
  const statsDiv = document.getElementById('stats');
  const galleryDiv = document.getElementById('gallery');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = lightbox.querySelector('img');

  searchBtn.addEventListener('click', () => {
    const username = usernameInput.value.trim();
    if (!username) {
      alert('Please enter a username');
      return;
    }
    fetchPrivatePosts(username);
  });

  async function fetchPrivatePosts(username) {
    // Reset UI
    galleryDiv.innerHTML = '';
    statsDiv.style.display = 'none';
    loader.style.display = 'flex';

    try {
      const response = await fetch(`/api/instagram?username=${encodeURIComponent(username)}`);
      const data = await response.json();

      loader.style.display = 'none';

      if (!data.success) {
        statsDiv.style.display = 'block';
        statsDiv.innerHTML = `<span class="error-msg">❌ ${data.message || 'No private posts found or account is public'}</span>`;
        return;
      }

      // Success: display gallery
      statsDiv.style.display = 'block';
      statsDiv.innerHTML = `
        <span class="success-msg">✅ SUCCESSFULLY EXTRACTED ${data.total} PRIVATE POST(S)</span><br>
        <small>All images are highest resolution available</small>
      `;

      renderGallery(data.images);
    } catch (error) {
      loader.style.display = 'none';
      statsDiv.style.display = 'block';
      statsDiv.innerHTML = `<span class="error-msg">❌ Error: ${error.message}</span>`;
      console.error(error);
    }
  }

  function renderGallery(images) {
    if (Object.keys(images).length === 0) {
      galleryDiv.innerHTML = '<p style="text-align:center;">No images to display.</p>';
      return;
    }

    let html = '';
    for (const [postId, url] of Object.entries(images)) {
      const shortId = postId.length > 20 ? postId.slice(0, 20) + '...' : postId;
      html += `
        <div class="card">
          <img class="card-img" src="${url}" alt="Instagram post" loading="lazy" onclick="openLightbox('${url}')">
          <div class="card-info">
            <span class="post-id">📌 ${shortId}</span>
            <div class="btn-group">
              <a href="${url}" target="_blank" class="btn btn-primary">🔍 View</a>
              <a href="${url}" download="${postId}.jpg" class="btn">⬇️ Save</a>
            </div>
          </div>
        </div>
      `;
    }
    galleryDiv.innerHTML = html;
  }

  function openLightbox(imageUrl) {
    lightboxImg.src = imageUrl;
    lightbox.classList.add('active');
  }

  lightbox.addEventListener('click', () => {
    lightbox.classList.remove('active');
    lightboxImg.src = '';
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && lightbox.classList.contains('active')) {
      lightbox.classList.remove('active');
      lightboxImg.src = '';
    }
  });
</script>
</body>
</html>
